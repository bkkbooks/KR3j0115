body:
  text: 東園叢説卷中宋李如箎撰語孟説北辰為政以徳譬如北辰居其所而衆星拱之先儒觀極星居其所而不動遂謂以徳為政者無為而治如北辰之不動而衆星共之也其道理則是但極星初非北辰又極星人雖不見其動亦自運轉未嘗不動也但其運轉也㣲人覩其旁星之轉動而不知極星之轉動耳春秋傳云心為大辰伐為大辰北辰為大辰所謂北辰原非北極也北極與南極處天樞之中兩極相對以運轉天體北極一星道家所為北極紫㣲大帝者是也紫㣲垣中北極之旁華葢之下勾陳之中一星曰天皇道家所為天皇大帝者是謂北辰星辰之至尊主宰萬物衆星之所拱者也其星一晝夜運轉一周亦未嘗不動又昔之考察星候者常用竹管穿壁以望極星終夜之間或在管之中或在四旁但不出管外蓋運動天樞之中其動也㣲耳亦不為不動常究其所以然者蓋縁渾天之象有類於輪南北二極迺轂之兩端運於樞中者也夫車輪逺於轂則其轉也疾而彰近於轂則其轉也緩而㣲至於樞間轂端之轉迫而視之則見其動逺而視之則宛然不動也指北極為北辰且謂其不動者不達於天文故也孔子所言取其居所而衆星拱而已執圭鞠躬如也鄉黨曰執圭鞠躬如也按鄉黨一篇記夫子居鄉在朝廷宗廟禮儀之事也夫公侯伯方執圭子男則執璧孔子魯大夫如何執圭葢夫子出聘他邦之事也禮曰大夫執圭而使所以申信也凡大夫出聘則奉君之瑞玉以行若其身至然以致其敬也魯侯爵當執信圭夫子葢嘗持以聘隣國也鄉黨之文自執圭鞠躬如也至私覿愉愉如也皆言出聘異國之禮儀也禘自既灌而徃灌字同音者三詩云祼將于京語云禘自既灌而徃易云觀盥而不薦是三字者灌與盥同義謂以水灌洗灌爵灌手之類也祼則以酒祼獻於神者也論語云禘自既灌而徃吾不欲觀之者灌爵之後則行薦獻之禮禘之為祭羣廟之主皆至於太廟與大祫同君釋服之後講大祭者二曰禘曰祫其後凡五年而再祭祫則羣廟合食禘則主於審諦昭穆既灌之後行薦獻之禮其禮自上而下魯躋僖公昭穆不正故孔子稱不欲觀之而不斥言其故也或有人援易盥而不薦有孚顒若之説以為既薦則精誠少懈故孔子不欲觀既灌而徃非也易所謂盥而不薦有孚顒若者謂精誠内充不假於物而其孚自顒若也至於薦則其孚固非有損假於物而有可見之迹也若曰既灌而徃則不欲觀則所以灌者何事也知之次也子曰蓋有不知而作之者我無是也多聞擇其善者而従之多見而識之知之次也此段説話自來儒者觧釋不甚通徹其要㫖在作字上吾夫子當周末之時述作者紛紛不知惟聖賢然後可以作如伏羲氏作易大禹臯陶之作謨伊尹之作訓箕子之作洪範皆有生知之質明乎天人之際故能有所作以垂萬世之法式末世葢有無知見之明而遽有所作者虛無詭異叢碎駁雜且無知於天地之間徃徃有之所謂不知而作之者也如夫子之作春秋亦何愧於羲之易箕之範然夫子不以生知自居故不以作經自任故嘗有述而不作信而好古之言又曰我非生而知之者好古敏以求之者也其立言垂訓有次於述作之事而曰多聞擇其善者而従之多見而識之知之次也其意以為己之述作者如此故無悖理傷道迂濶不經之患雖不可以匹生知之賢聖亦可以為知之次與不知而作者異矣予於此有以見聖人退讓之意又足以明述作之要云叩其兩端子曰吾有知乎哉無知也有鄙夫問於我空空如也我叩其兩端而竭焉此一段説話亦學者之所難曉者先儒釋兩端為終始不知有何意義能知兩端之説則數句格言通徹貫串洞然無疑者矣夫語道之要只是兩端真偽是也夫降衷之性存乎人道徳仁義出於天然者真也喜怒哀樂愛惡欲之發乎人之情者偽也天真不明而人偽勝則為小人為禽獸天真昭晰而人偽不能亂則為士君子為賢聖孔子發簡要簡逕之言以曉晤學者無若此數語者矣孔子之意若曰我安能自有所知哉我之所知匹夫匹婦可以與知者也天下之人不能知之者以不能明其孰為天真孰為人偽也二端不明而欲知道之所存難矣能照破兩端而别其真偽雖愚鄙之夫亦將竭盡其自然之知識而不疑於道矣故曰有鄙夫問於我空空如也我叩其兩端而竭焉空空者未有知識而誠慤内充者也故夫子叩以兩端而遂能洞曉若先有知見則又為聰明所累未見其能竭焉也子路孔子於羣弟子中貶駁季路甚多季路於孔子亦有抵忤處學者徃徃以此少之僕謂孔門自淵騫伯牛仲弓數人下可進道者無如季路顔子之如愚固與聖人心相契合子路則有疑而未達處不肯遽以為是故不能無抵忤葢學道到有疑處亦甚難得者也㣲生髙子曰孰謂㣲生髙直或乞醯焉乞諸其鄰而與之説者謂孔子言㣲生髙之非直是不明夫子之意者也葢直有正直之直君子所尚如易所謂直方大是也有執直之直君子少之如孔子稱直哉史魚君子哉蘧伯玉是也㣲生髙在當時諒有以執直名之者夫子見其乞隣一事有以知其亦能圓轉委曲以盡人情葢謂其非執直者所為也不然乞醯於鄰以與人何至得罪於君子之門哉畫邑東漢注云畫中邑名也畫音獲胡麥反故城在今西安城東南有畫水因名焉孟子去齊宿於畫今學者相承讀為晝夜之書嘗考齊地無晝邑趙岐云齊西南近邑也按史記王蠋畫邑人注云畫齊西南近地畫音獲與東漢注音同葢讀為晝者俗師相承之誤也又水經注云臨淄西南二十五里有澅水土人謂之宿留水以孟子去齊嘗宿於此故也水西有王蠋墓孟子孔子之後可以傳道者莫如孟子孔子嘗曰吾未見剛者或對曰申棖子曰棖也慾焉得剛且如子路之行行可謂剛强不忮不求可謂無欲然亦尚有未到處夫子以此未許只剛之一字所占地位甚廣孔子所以嘆當時之未見也孟子深明厥㫖於是有浩然之氣之説以為至大至剛直養而無害塞乎天地之間是因夫子未見剛者之言而發明之也孔子之繫易有曰一隂一陽之謂道繼之者善也成之者性也孟子深明厥㫖於是有性善之説推原人心其惻𨼆者為仁之端羞惡者為義之端辭讓者為禮之端是非者為智之端以為天然固有之善人生而具者是因夫子繼之者善成之者性而發明之也其他言行與孔子契合者甚多故曰可以傳夫子之道者莫如孟子也諸子言性先儒嘗謂孔子之言性相近也習相逺也雖有相近之説而不言其善惡自孟子始有性善之説孟子既以為善故荀卿以為惡善惡孟荀已言之矣故揚雄以為善惡混善惡混揚雄既言之矣故韓愈以為有上中下三等起諸子紛紛之論者葢自孟軻啟之是説何其淺也君子之語道惟其是而已豈宜求異而自立其説哉殊不知孟子性善之説葢本於易繼之者善成之者性之説其言當於理真不易之論也荀卿之所謂惡者是以情為性也揚雄之所謂善惡混者是以習為性也韓愈之所謂上中下三等是以才為性也皆不明其本明其本者惟孟子性善之説為至當瞽瞍底豫書云帝初于厯山徃于田號泣于旻天負罪引慝祗載見瞽瞍䕫䕫齋栗瞽瞍亦允若允之為言信也若之為言順也言瞽瞍見舜純孝如此亦為之感動而信之順之也方在厯山之時已能以至誠感動瞽瞍而使之信順象之傲慢於此亦必少悛矣故師錫帝曰有鰥在下曰虞舜父頑母嚚象傲克諧以孝烝烝乂不格姦夫人日與善人居則不能不化而善與惡人居則不能不化而惡况乎終日與頑嚚傲狠者居日以戕賊殺害者之為務雖以賢智者處於此地豈能不為之動心而起忿懣之心哉忿懣之心一萌則至於姦矣惟舜大孝之誠根於天性如真金之在鎔百煉而不可變易故能烝烝以自治不至於姦其於父子兄弟之間能盡其道如此堯又欲觀其所以處室家者於是以二女妻之以觀其内行而二女果不敢恃其貴驕事舜親戚甚有婦道書所謂嬪于虞者是也夫夫婦婦父父子子兄兄弟弟各得其所而人道極矣故堯舉天下而付之孟子曰舜盡事親之道而瞽瞍底豫瞽瞍底豫而天下化瞽瞍底豫而天下之為父子者定孟子之所謂底豫即書之所謂允若者也葢嘗謂父慈子孝兄友弟恭人倫之常道中人皆足以服行惟舜遭人倫之變厥父母厥弟不惟不慈不恭而已日以殺之為快而舜則惟盡其在己者而不顧其在彼者至誠所格而瞽瞍亦為之悦豫三綱五常之道至此而益明矣至此而臻其極致矣故史稱明徳自虞帝始非謂堯以上明徳不著于天下正謂虞舜遭人倫之變而克盡其道使三綱五常之義一定而不可變謂自虞帝始誰曰不然哉耕者九一井田之制什一而徹孟子言耕者九一何也葢一井之地為九百畆其中為公田八家皆私百畆同養公田則是九一安得為什一也葢八家於公田百畆之中又得二畆半為廬舎八家共占二十畆只為公家耕八十畆八家皆私百畆為公家耕八十畆每家十畆是什一也孟子言五畆之宅者此外保城之中又占二畆半冬月居之是為五畆之宅金聲玉振孟子曰伯夷聖之清者也伊尹聖之任者也栁下惠聖之和者也孔子聖之時者也孔子之謂集大成集大成也者金聲而玉振之也金聲也者始條理也玉振之也者終條理也始條理者知之事也終條理者聖之事也知譬則巧也聖譬則力也猶射於百步之外其至爾力其中非爾力也孟子之意葢謂伯夷之清伊尹之任栁下惠之和三者力量皆到得聖人地位曰清曰任曰和俱得為聖人之事如射之能至者也但三人者各得其一而未能兼通惟孔子為聖之時時清則清時任則任時和則和如射之有至又能巧中者也故曰孔子之謂集大成集大成也者金聲而玉振之也謂其兼聖智而全盡之也如三人者但力量可以到得聖人地位而未能全盡聖智之事譬如射者能至未能中也始終條理者自舉樂中金聲玉振為喻條理二字與清任和集大成之意初無干涉葢作樂之條理鐘為始而磬為後始以鐘聲合樂至其成則以磬聲為準故周禮以鼓鐘奏九夏詩云既和且平依我磬聲是金聲為始而玉聲終之也孟子取喻若曰金聲也者作樂之中始條理也玉振之也者作樂之中終條理也始條理主謂金聲以譬知之事謂金聲有洪有殺圎轉而善應也故為智之事終條理者主謂玉振以譬聖之事謂玉聲有一定之體而不可易故為聖之事條理二字自主於作樂鐘磬之始終初不指聖智為言也學者不明其指遂謂始條理者是智終條理者是聖至出聖智始終條理論不知智如何是始聖如何是終智之條理如何聖之條理如何科舉之文穿鑿撰造必巧為之説牽强可知矣盡心孟子曰盡其心知其性則知天矣存其心養其性所以事天也盡心知性而知天是知見之事存心養性以事天是踐履之事辨經傳所言天經傳之言天有二義有天地之天有自然之天夫天之與地固有一定之名天下有自然之理非出於有為知見之所不能到則歸之天此非天地之天蓋自然之理不可以形迹窺而謂之天也中庸言天命之謂性説者便謂性出於上天之所命夫天固主死生禍福之權又安能以性而與人哉茍能以性與人賢智愚不肖天何付畀之不同也哉故中庸之所謂天命之謂性以性乃天然固有而命之於人者也如孟子所謂知天事天知天者謂明乎天然之理事天者謂循乎天然之理也天上帝孝經云昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝先儒謂以天與上帝為一伊川謂以形體言之為天以主宰言之為帝非也后稷配天者謂昊天上帝也文王配上帝者謂太㣲五帝感生者也周官大饗是祀昊天大旅是祀五帝周家文武之功起於后稷故推以配天文王受命作周故配感生帝周家木徳即是以文王配靈威仰之帝也天文厯數説四遊先儒常有四遊之説謂地居天中有升有降或南或北其説謂地在天之中舊説如卵之黄者是也自春分漸降而又漸漸著南至夏至極南降而下一萬五千里自夏至以後即漸升而上又漸漸著北至冬至極北升而上亦一萬五千里冬夏二至地或南或北升降上下於三萬里之間故冬至地升而上者萬五千里又最著北故日居於南而去天近所以日晷至短夏至地降而下者萬五千里又最著南故日居於北而去天逺所以日晷最長春秋二分地升降上下與南北皆居中適平在三萬里之中日居天地上下南北之中故日晷不長不短其説見於鄭元不知其説自誰始亦大費思索矣然非至當之論也蓋縁先儒不詳渾天之形覩日有南有北去地有逺有近而晷有長有短故為是説殊不知地至靜之體安得有遷動轉移而上下升降南北徃來之理哉蓋渾天之體其形如卵地居其中周天三百六十五度四分度之一周圍其外天半在地上半在地下一日運轉一周赤道帶天之紘居南北二極之中黄道斜運半在赤道内半在赤道外在赤道内極北去赤道二十四度在赤道外極南去赤道亦二十四度日之行雖曰左旋而實循黄道又有南有北冬至則極南去赤道二十四度與黄道同夏至則極北去赤道二十四度與黄道同春秋二分則當赤道與黄道所交之中南去冬至日之所在二十四度北去夏至日之所在亦二十四度二至二分或南或北進退往來於四十八度之間縁天體北髙而南下南北二極相對北極出地三十六度常見而不𨼆南極入地亦三十六度常𨼆而不見北極出地而髙南極入地而下天形北髙而南下則天之中赤道之中分南北者不在人頭之上而近南稍下矣猶是冬至日行至黄道極南之處去地近而晷短夏至日行至黄道極北之處去地逺而晷長蓋兩極居天之樞一髙一下日循黄道運於其中故冬至日行地下多而地上少夏至日行地下少而地上多此日晷長短之不齊耳明乎渾天之象則日月星辰之行與夫四序推遷之道如示諸掌四遊之論無取焉爾地深厚之數天體周徑以度推考之亦可以步里計惟地之深厚古人未有言其數度者予嘗冥捜而得之地准天度之數厚八度八百分度之六百四十一蓋用天輪運轉與刻漏而推之也其説斷然有不可易者非臆測牽强而云爾也葢日入地則為夜出地面方為晝將昏時日已入地矣更二刻半方黑曉時日未出地面先二刻半已明用此為旁照則地之深厚數不可逃矣夫日已入地而未黒者葢尚在地之側而未入地下故光透上而未黒也至二刻半轉入地下而始黒矣日未出地面而先明者葢已出地之下故光透上而先明也至二刻半而日方出於地之面矣日之出入隨天體而運轉一日一夜而一周天周天三百六十五度四分度之一一晝凡百刻百刻之中日隨天運轉三百六十五度四分度之一計二刻半合轉八度八百分度之六百四十一也予嘗以此約昏旦地之厚薄少差則晝漏夜漏於二十四氣之中皆差惟是此數與厯相應天地之形舊説天形如卵地形如卵黄中髙而四隤予嘗深究之天形如卵是也謂如卵黄中髙而四隤非也地居天上下四圍之中其形如餅北㣲髙而南微下八度八百分度之六百四十一為之深厚此地之真形也夫洛陽陽城縣為地之中若地中髙四隤陽城之地當絶髙於天下也而東西南北皆漸低而下望陽城若居霄漢之上矣今地惟北髙南下則知中髙四隤之説為非是也或曰地有山嶽河海髙下之不同烏得其平如餅殊不知以人之所覩言之其險夷萬状安得如餅以天之髙逺地之深厚言之山嶽河海之為髙下曾㡬何也升乎宇宙之表而下視之吾見其平之如餅矣渾葢説天之家有曰周髀曰宣夜曰葢天曰渾天而厯代太史氏之所用者不出於渾葢揚子雲深於天文者也其法言語葢天則曰葢哉葢哉應難未㡬也語渾天則洛下閎營之鮮于妄人度之耿中丞象之幾㡬乎莫之能違也夫葢渾之為用一也但葢天之形状如倚葢故南方星度漸向踈濶不與近北者同又南極𨼆而在下當與北極相對無他位可以指定其處此其不如渾天之密也然渾天惟制器可以備列辰象不可以為圖凡今之所謂渾天圖實葢天之法而寫葢天之形也堯典在璿璣玉衡以齊七政儒者解釋徃徃不明愚謂璣者周旋而運轉者也衡居中而不動者也璣之運轉必出入乎衡之上下以正朝夕周旋而運轉者天也居中而不動者地也以是知璿璣玉衡即渾天也洛下閎諸公其知此矣愚以玉衡為地則所謂地形如餅信矣此語惟深於天文者可語當今有張平子者僕將持是以質之二極𨼆見之度舊説北極出地三十六度周圍七十二度内星象常見而不𨼆南極入地亦三十六度周圍七十二度内星象常𨼆而不見唐志云浮海者見老人星下有星明大者甚多而不知其名所𨼆而不見者也按老人星常於二月八月見於桑榆間葢居南極七十二度之外出乎地面之上者也北斗之星常轉著於地而復起葢居北極七十二度之表者也夫北極髙而南極下其説是矣愚甞推度之二極之出地與入地皆不及三十六度之數其出入之度實二十四度而已何以明之北極與南極相去一百八十三度弱南極又在地下三十六度則自北極而南至地面一百四十七度南極至赤道九十一度半弱冬至之日又在赤道南二十四度三十六度又入地中冬至日中時日去地只三十一度半弱夫地面而至天中謂之天徑之半則其髙六十一度今冬至之日當日中時去地僅三十一度半則冬至之日晷不能及四十刻其他四時之刻皆不能如數矣僕常為天文圖南北二極𨼆見之數只用二十四度又計地之深厚以日入為夜日出為晝四序晷刻其數符合分毫不差惟厯家通曉者可以語此二十四度之説古人亦嘗言之而未詳也月蝕衝厯家考中星推五緯與太隂之躔度皆目所能覩可以的知其在某星㡬度惟太陽特可以數而推其所在欲觀其五日則小覺矣故五日為候三候十五日其變稍著故三候為一氣自此更六氣其變大著故六氣為一時曰春曰夏曰秋曰冬四時具而成年凡一朞七十二候二十四氣成四時而一周天二十四氣每氣十五日共三百六十日據一朞之數當三百六十五日四分日之一所少者五日四分日之一故分一日為三十二分每氣𬋩十五日七分此七前後相通一日凡百刻分為三十二每分𬋩三刻八分刻之一也東園叢説卷中
