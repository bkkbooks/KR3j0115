body:
  text: 東園業說雜家類三雜說之屬提要臣等謹案東園叢說三卷舊本題宋李如篪撰如篪始末未詳據卷首紹興壬子自序則括蒼人時為桐鄉丞也又有紹興甲寅建安周庭筠刻是書跋稱為東園先生則東園其號矣其書諸家不著録莫考其所自來下卷雜說中載所作初夏詩及其父歡喜口號三首為向來録宋詩者所未及又是書序于壬子為紹興元年刋于甲寅為紹興三年而紀時事一條紀紹興六年楊么李成憸佞一條紀紹興二十四年秦勛登第事以少敗衆一條紀紹興三十一年兩淮失守事且有稱髙宗廟號者則書當成于孝宗時年月殊不相應且語孟說一門語孟合稱不似南宋初語所辨北辰不動一條與明陳士元論語類考之說同似乎曽見集注故有此說亦不似朱子以前語其天文歷數說謂今之渾天實蓋天之法亦似歐邏巴書既入中國之語宋以前即推步之家未明此理無論儒生或近時好事者捃托舊文益以所見僞為此帙託之宋人歟然但就其書而論則所言雖不盡精核亦時有可采如春秋行夏時一條謂以建子為周正月乃左氏之失不知左氏周人紀他事或失之誣至于本朝正朔則婦豎皆知左氏不容有誤詩亡春秋作一條謂孔子所聞所見之世無詩不知株林夏南詩有姓名不能移之東前也召公不悅一條謂周公朝諸侯于明堂召公嘗北面而事之則誤信明堂位之謬說左傳其處者為劉氏一條疑邱明先知又疑其附㑹則未考此句為漢儒增入孔頴達正義已有明文然如解王用三驅引周官大司馬立表為證解坤六五爻駁程傳女媧武氏之非解說卦生蓍糾揚雄産蓍之誤解繫辭太極生兩儀為生蓍之法引左傳楚有句澨漳澨雍澨蓬澨諸地證三澨非水名解關雎為后妃求淑女引崔靈恩三禮義宗證縮酒用茅之義以及考究易之八法及六百七分之說推算絳縣人甲子之類皆典核不茍于經義頗為有禆故與嶽珂棠湖詩稿雖皆出自近日顯有可疑而以其書可採亦姑並存之以資𠫭訂焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀東園叢說原序僕頃年僻居語兒之東鄉既無進取之望又不能營治資産日與樵漁農圃者處羮藜飯糗安分循理亦足以自樂時時披閲文集省記舊聞隨手筆之遂成卷帙其間經史子集天文地理厯數之說無不有之目之曰東園叢說好古博雅君子覽之者殆有取焉紹興壬子三月下浣桐鄉丞括蒼李如篪自序
