  text: 東園叢説跋東園先生李君少遊上庠博學多聞與紹興諸魁皆友善平時上下論議出入經傳前言往行靡不識録庭筠來吏桐鄉密邇南牆暇日授讀得償未見之願謹輟俸以刊諸梓其於學者亦有助云紹興甲寅正吉建安周庭筠識
