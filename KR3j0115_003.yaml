body:
  text: 東園叢説卷下宋李如箎撰雜説赤壁賦東坡先生赤壁賦曰七月既望月出東山之上徘徊斗牛之間按月令孟秋之月日在翼昏建星中建星葢在斗牛間中星在斗牛則月當在室壁間去斗牛甚逺秦漢至今雖有嵗差昏旦中星不得而同以大要言之亦只合在危室間無縁在斗牛又指黄州赤壁為周瑜敗曹公之處皆不然赤壁葢在今鄂州蒲圻縣界周瑜嘗語孫權請兵三萬人進駐夏口保為将軍破之夏口即鄂州也愚嘗謂宗師大儒以傳先聖之道立言為書以詔後學為己任至於天文地理所謂末學初不深究也如孟子稱决汝漢排淮泗而注之江泗水蓋自兖厯鄆徑徐至下邳而入淮汝水亦自汝至蔡州汝陽縣西北而入淮二水俱入淮而淮水東注於海未嘗至江孟子鄒人去淮泗不逺所言尚有差誤則知大賢宗師不當責以此也韓信自當項羽伊川先生語錄云惜乎項羽韓信司馬仲達諸葛孔明不曽合戰得於中原戰得㡬塲方有可觀此言葢有為言之也四人在當時親見之者且不能決其勝負後之人按紙上語出於臆度遽謂孰勝孰負一彼一此甚無謂也伊川之言葢厭後世紛紛之論也按班固陳壽二史所載司馬諸葛韓信項羽委是不曾合戰而史遷記中垓下之役云淮隂侯以三十萬自當之羽敗遷史謂之實録此一項最是大事必不虛書班書不載亦别有説伊川謂不曾合戰偶有不照耳荀卿史遷作文之體詩家用古人意造語謂之脱胎著書作文亦有之如書云甲子昧爽至於商郊前徒倒戈攻于後以北荀子則云朝食於戚暮宿於百泉壓旦於牧之野鼓之而紂卒易嚮言壓旦於牧之野即昧爽至於商郊也言鼓之而紂卒易嚮即前徒倒戈也是脱胎法也荀卿此一篇自周公相武王以伐紂一段其文極佳又堯典云釐降二女於溈汭嬪於虞帝曰欽哉司馬遷史記則云二女不敢貴驕事舜親戚甚有婦道即堯典嬪于虞之意葢将嬪于虞三字衍為十餘字以敷暢厥㫖亦自好也學者自出己見本朝熈寧中太子右賛善大夫呉安度召試舎人院考試賦入第三等論入第四等止縁竹青青詩不依注解作王蒭篇竹遂定入第五等因是改一官放罷宰臣富弼言切詳安度命意必謂王蒭篇竹柔能脆常草不足以興詠武公之徳注説遷就非詩人本意也又按史記河渠書云淇園之竹則知淇澳之竹祇是竹箭之竹也又按陸徳明釋文青音菁茂盛之貌於理甚通未為不識題意乞再取安度所試三題詳定下學士院看詳並准合格惟詩不合自出己見亦非純謬於是賜安度進士出身愚嘗謂注疏之學執而不通之處固多有之前輩讀書徃徃欲有師承必務遵守其説明有所據依也其自出己意如吳安度者理致甚當再加詳定尚以不合自出己見為過自非宗工鉅儒為世師表有以發明經典之㣲㫖奥義者則不敢輕視傳注而用其臆説故學者有所傳授而士風淳厚時世日趨浮薄學者觀書不務本原傳注雖存而未嘗省覽即用己見立説反謂先儒所不能到甚可嘆也近有朝士居常以大儒自負一日為僕言禮記云儒者㸃句之誤曲禮云席東嚮西嚮以南方為上南嚮北嚮以西方為上且如今之屋宅靣嚮北得以西方為上嚮南安得以西方為上也面嚮西得以南方為上嚮東安得以南方為上也元作四句㸃今當作六句㸃當以席東嚮西為一句嚮又為一句以南方為上為一句南嚮北為一句嚮又為一句以西方為上為一句是以屋宅坐東嚮西坐南嚮北為言鄙俚訛謬有如此者既不詳正經之文又不觀鄭氏之注而用其臆説者也殊不知禮經非以屋嚮背為言葢以席相對為言南嚮北嚮則席端當自西以次而下兩席相對是西方為上也東嚮西嚮兩席相對則席端當自南以次而下是南方為上也葢謂賔主在坐之人布席相嚮而坐東嚮西嚮則南方為席端南嚮北嚮則西方為席端經文先以席一字掲於其上故鄭氏以布席席端為觧可謂允當矣如朝士之説良由讀書鹵莽而又果於自用故也予當時聴其説㡬乎失笑因悟熈寧有司貶黜吳安度未為過葢防其末流之弊将至此也李照論樂以十龠為合二帝三王之世莫不以律度量衡為要務故有虞氏巡狩省方必以同律度量衡為先而夏禹之訓亦以闗石和鈞為重此有國之成規生民之日用詎可忽哉本朝李照修大樂耗費朝廷財用不貲於度量之間甚有疎舛黄鐘律容一千二百黍是為一龠合龠即為合李照却云十龠為合其失也甚矣葢據書坊中本為言也納音禮云十二律旋相為宫葢十二律應在十二月每月各自為宫各自有商角徴羽共五聲作樂謂之一均故十二月有十二等宫聲十二等商聲十二等角聲十二等徴聲十二等羽聲其清濁髙下各自不同總十二月為六十音謂之納音者納此六十音於六十甲子之中也且如甲子乙丑海中金是十一月十二月之商聲也丙寅丁夘爐中火是正月二月之徴聲也戊辰己巳大林木是三月四月之角聲也庚午辛未路傍土是五月六月之宫聲也甲寅乙夘大溪水是正月二月之羽聲也以類推之不必概舉是為納音感生帝五行之帝居太㣲中受命之君必感其精氣而生東方木帝曰靈威仰西方金帝曰白招拒北方水帝曰叶光紀南方火帝曰赤熛怒中央土帝曰含樞紐故以木徳受命有天下者則祭靈威仰金徳受命有天下者則祭白招拒水徳則祭叶光紀火徳則祭赤熛怒土徳則祭含樞紐謂之感生帝故周人祀靈威仰本朝祀赤熛怒是也韓愈詩文韓文公唐室大儒學者至今以傳先聖之道推之謂先聖之道自孟子之後惟愈得其傳荀揚之徒不與也愚觀愈之書其文章純粹典雅司馬遷揚雄殆無以過其行已亦中正可為後人模範然其文亦有大不可人意處如讀書城南詩今士人家家誦之盤谷序舉世善之然愚謂二文乃文公之失如美玉之瑕玷而人未之察也夫君子之讀書以求仕進本為行義達道以遂其志初非為富貴榮名計也如公孫衍張儀操縦横之術當世之君奉承之不暇蘇秦綰六國印儀従比王者而孟子視此輩比之妾婦其自為則曰後車千乗侍妾數百人我得志不為然則平日之所養可知已今文公二篇之文迺以潭潭之府粉黛列屋為大丈夫得志之事何其陋也愚每讀其文至此二篇則情緒作惡者移時不能釋今人以此訓後生不㡬乎以文錦覆陷穽者哉韓栁韓退之栁子厚皆唐之文宗儒者之論則退之為首而子厚次之二人平時各相推許退之論子厚之文則曰雄深雅健似司馬子長崔蔡之流不足多也子厚論退之之文則曰退之所敬者司馬遷揚雄遷之文與退之固相上下如揚雄太𤣥法言退之特不作作之加瑰竒詳究其作二公之論皆非溢美但退之之文其間亦有小疵至子厚則惟所投之無不如意如退之元和聖徳詩序劉闢與其子臨刑就戮之状讀之使人毛骨凛然風雅中安有此體至子厚平淮雅讀之如清風襲人穆然可愛與吉甫輩所作無異矣歐文歐陽永叔之文純雅婉熟使人讀之亹亹不倦然比之韓栁所作則雄深道勁不及也雖各自有體然亦傷助語太多如醉翁亭記其文之美者也亦有助語可去如曰環滁皆山也其西南諸峯林壑尤美則其字可去漸聞水聲潺潺而瀉出乎兩峯之間者釀泉也則而字可去瀉字亦自可去然而禽鳥知山林之樂而不知人之樂然而二字可去如此等閒字削去之則文加勁健矣大抵為文要須移動一字不得方好釣臺記聞之前輩云范文正公作嚴子陵釣臺記其文已就召人能為改一字者當有厚贈有一士人乞改一字記云雲山蒼蒼江水泱泱先生之徳山髙水長乞改徳字作風字公大喜遂改風字因厚贈之改徳字作風字雖只一字其意深長文益大増勝矣坡詞坡詞卜筭子山谷嘗謂非胸中有萬卷詩書筆下無一㸃塵氣安能道此語愚㓜年嘗見先人與王子家同直閣論文王子家言及蘇公少年時常夜讀書隣家豪右之女常竊聴之一夕來奔蘇公不納而約以登第後聘以為室暨公既第已别娶仕宦嵗久訪問其所適何人以守前言不嫁而死其詞時有幽人獨徃來縹緲孤鴻影之句正謂斯人也揀盡寒枝不肯棲楓落呉江冷之句謂此人不嫁而云亡也其情意如此繾綣使他人為之豈能脱去脂粉輕新如此山谷之云不輕發也而俗人乃以其詞中有鴻影二字便認鴻雁改後一句作寂寞沙洲冷意謂沙洲鴻雁之所棲宿者也愚每舉此一事為人言之莫以為然此可與深於辭翰者語豈流俗之所能識也哉王子家諱俊明官至中大夫直祕閣與先人道此語時在紹興三年寓居於婺州蘭溪縣之西安寺王公時已年七十餘蘓子由之壻也有文章書字與東坡相似先人嘗謂其字法傳於東坡王公云東坡本學徐浩書某亦學徐浩書偶相似耳其言三蘓故事甚多愚㓜小不能記也論詩作詩有古人偶相類者僕常於初夏間作詩其中一聨云繅車籬落桑隂盡土鼓鄉亭稻葉青吳江宰黄濟卿見之曰此荆公意也荆公嘗有詩云繅成白雪桑重緑割盡黄雲稻更青其措意造語皆畧相似然僕作詩時初未知荆公有此一聨也實偶相類耳唐贊唐文宗贊稱其勤政有曰唐制以隻日視朝乃命輟朝放朝皆用雙日讀者或不明其義葢唐制視朝不用雙日且如一月一日有指揮輟朝三日則輟初一日初三日初五日以雙日元不用也初六日當放朝又是雙日至初七日方放朝也然則輟朝五日雙日不用是輟六日今皆用雙日則初一初二初三初四日即放朝以此知勤政鵩賦注觧釋古人之文最是難事失之毫釐則謬以千里如賈誼鵩賦有曰釋智遺形超然自喪注云絶聖棄智絶之棄之用力甚勞豈能超然自喪也哉諸葛孔明諸葛孔明出師司馬懿兵禦之懿曰亮誠勇者若依山而東且當避之西上五丈原諸軍無事矣孔明果西上五丈原司馬仲達謂其𠫭佐曰亮志大而不見機多謀而少决提卒十萬已墮吾策中破之必矣當時之人與後之讀史者皆謂孔明已為仲達所料殊不知孔明之出原欲先取隴右然後取闗中故魏延請以三萬人為奇兵㑹關中而亮不許也其一定之畫如此故必須向五丈原司馬仲達皆曉識兵勢者其智謀足以先料知其必由五丈原也故為是説以詭衆而作其士氣耳是仲達之黠數也若果足以制勝何至堅壁而不進哉夫行兵之道作将士之氣為先不可未戰而使其先氣挫故宋武帝征慕容超兵踰大峴而旛竿折軍皆失色武帝喜曰昔征盧循幡竿折而破之今幡竿亦折師險士必有死之志餘粮棲畝人無匱乏憂破之必矣皆所以作士卒之氣也李晟之平朱泚時彗星見諸軍皆喜請速進兵晟以為星象之變不可測忽有退舎則吾軍不戰而其氣先怠矣故善用兵者必以作士氣為先不可不知也堅壁㢘頗堅壁不戰以拒白起司馬懿堅壁不戰以拒孔明皆深曉兵勢者蘓先生所謂與智將戰則持之者是也以少敗衆用兵固有以少敗衆者如周瑜以三萬人敗曹公於赤壁謝元以八千人破苻堅於淝水是也然不可以為常兵法十則能圍之倍則能戰之故王翦攻楚必用六十萬人垓下之役淮隂侯以三十萬當項羽皆以全制之者也仁宗朝西邉用兵劉平任福葛懐敏等皆破軍殺將然五路之地不至陷失者以鄜延環慶涇原鳳翔等路皆屯重兵其當敵之要衝者不下數萬人足以控制之故也紹興初金人之勢方熾偽齊父子戮力作難嵗為邉患然而兩淮荆襄四川皆足以防禦偽齊終以無功被廢者以韓世忠屯淮隂劉光世屯合肥岳飛屯夏口吳玠屯河池各不下一二十萬人足以控扼之也王彦之守興勢紹興二年敵将入宼時劉子羽在興元呉玠楊政在河池先戒彦以不可輕敵彦以殄滅草冦得雋居多而欲自用暨烏珠率劉益等犯金州彦以五千人背城而戰果至失利退走達州呉玠楊政劉翬等共守饒豐嶺以遏其鋒敵攻饒豐踰月不能上嶺之旁有松門闗者峻險不可陟吳玠等慮其冐險以出吾不意乃使郭仲以五千人守之以防不測敵果出松門攀木沿崖而升郭仲不能支遂失松門敵兵遶出饒豐之後吳玠等大驚急引兵退柵定軍山以待之時張魏公置司在閬州議欲徙司成都四川大震自非魏公威信之明玠等重兵可以制敵幾失四川辛巳金人悉起北兵傾國以臨淮甸劉錡狃順昌八千人之勝不復以重兵壓境而乃分布其兵於諸郡王權守鍾離當敵堂堂之衝所領止三萬人金軍初集思慮精專而兵力數十倍長驅南下勢若震霆王權安得不焚燒積聚而為宵遁之計哉辛巳兩淮失守劉錡之罪也記時事紹興六年間既誅滅楊么平定李成等四方無虞民庶安妥髙宗圖為收復中原計張魏公力贊之其時吳玠鎮蜀漢岳飛鎮鄂渚韓世忠劉光世分守兩淮岳飛隂結宛間豪傑及招誘大行雄强有請軍號而徃者飛慨然有掃清河朔之志而韓世忠亦悉師攻下邳以圖山東國威甚震金人稍懼又偽齊劉璘等連年入冦喪失軍實甚多知進取之無益由是有請和之議秦檜在北庭時已熟知金人之情既自北中脱歸居中參預朝政於是力主講和之議自後南北安靖北邉無烽火之警者垂三十載人皆歸功於檜而不知檜之所賴以濟和議之成者乃髙宗神武而諸帥攘袂徇國之功居多也和議之前朝廷有親征之舉詔書宣布僕先人嘗有歡喜口號三首謹錄之於左其詞曰諸将宣威正此時一人神武萬軍知無煩司馬誅荘賈共笑隋侯侈少師又曰要将孝友求張仲莫把魁梧望子房神略廟籌歸變化帝圖王業本雄强此篇主為魏公也又曰呉岳川襄百萬兵韓劉淮甸兩長城頗聞時雨蘓諸路更看壺漿走四京於時國勢方張諸将徃徃不樂和議岳飛力爭之父子被誅而其議乃始堅定石米建炎間年饑嚴之夀昌縣乏食尤甚縣官日食湯餅細民嗸嗸無告有掘地者得土極細而白其人取而食之亦能止饑縣人遂相率争取食之謂之石米用湯調和如米粉製造市井賣糕餅人亦製造以賣愚㓜時曾買以食味甘酸稍帶土氣食之臟腑亦無恙小民貪得無厭其取過多土輒坍有覆壓而死者至其秋小稔則其土遂麄惡不可復食矣此事極異又愚所親見因録記之唐太宗唐太宗誅建成元吉而有天下與齊威公殺公子糾而得國事足相方齊威以匡合之功見稱於仲尼以其有徳於斯民者大不得以過而掩其功也太宗雖有誅建成元吉之過其親定禍亂而治底昇平有徳於斯民者又非齊威之比使其出於孔子之世則誅殺兄弟之過亦可略云然於誅建成之際使尉遲敬徳入侍髙祖髙祖驚惶失措既迺不得巳而遜於位使在春秋之前當作如何書也又太宗於唐有人臣不能為之功固天命之所歸究其兄弟之争始由如晦與建成家人争道有隙稔成其禍至於同氣被誅髙祖見偪其事皆出於晦故史臣稱如晦善斷竊金者為盗竊國者為諸侯斯言信哉二帝三王之樂有虞氏之樂以簫為主書云簫韶九成鳳凰來儀是以簫為主也商人之樂以磬為主詩云既和且平依我磬聲是以磬為主也周人則以鐘為主周禮鐘師以鐘鼓奏九夏是以鐘為主也夫八音之中一曰鐘匏土革木特為和應其為樂之綱領者金石絲竹四者是也四者之中一曰鐘而磬次之簫又次之琴瑟又次之按伶州鳩云古者神瞽考其中聲以量之以制量均鐘司馬遷史獨存生鐘之法則知鐘者八音之首也故周人以鐘為主按十二月鐘磬皆有特懸諸器皆用鐘磬為均又石聲難調石聲和則鐘聲皆和虞書云戛擊鳴球搏拊琴瑟以詠祖考來格則磬於八音當次於鐘而與鐘同為衆音之首也故商人以磬為主又聲本於律律本斷竹以為之後或以銅或以玉為之故簫之為器亦可以度調故有虞氏以簫為主也舊説謂韶樂稱簫見細樂之備非也五行避忌避忌自古而然周家祀天神地祗人鬼皆不用商聲以金尅木周木徳忌之也如洛陽或従水或從佳漢都洛漢為火徳忌水故去水従佳魏承漢祚亦都洛魏為土徳水土之母水得土而流土得水而柔故除佳従水説見魏略氏號占兩地堯始封於陶又封於唐故曰陶唐氏季札始封延陵又封於州來故曰延州來季子秦楚皆三遷國都周孝王封非子為附庸邑之秦按秦水出隴山秦谷厯秦川川有故秦亭秦仲所封今秦州之地也至徳公始都雍至獻公徙居櫟陽孝公立方治咸陽自秦亭又凡三徙國都楚熊繹始封丹陽其地在今荆南之枝江縣至楚文王自丹陽徙都江陵平王城之是為郢都襄王二十一年秦拔鄢郢徙都於陳考烈王二十二年又徙夀春厯三世二十年而為秦所并自丹陽又三徙國都范増漢髙祖嘗曰項羽有范増而不能用所以為我擒髙祖之云亦怵於鴻門滎陽成臯之阨免於見死而云爾僕觀范増之為羽計者主於賊殺漢主一事而巳至於深謀逺慮圖取天下之成筭婉畫増葢未之知也劉先主闗雲長皆常居曹公掌握中而公無害之之志者恃吾有以制之也予於此有以知曹公有取天下之量與増之所見異矣且夫英雄崛起将以成當世之大業其道有三而戕害其敵不與焉一曰順民心之所向以為已資二曰據形勢之地以為根本三曰求當世之奇才以為任使舎是三者雖僥倖而得亦不旋踵而失之范増之相項氏於三者之中不能有其一焉切切然務在乎賊殺漢主而已使如増之謀可以殺漢主而亦終不能有天下也當秦之斃六國也楚自懐王之見執其人讎秦之志痛入骨髓故其諺有曰楚雖三戸亡秦必楚其人心所向可知矣劉項之起推懐王孫心為主故豪傑風靡而争趨之使范増有謀當教項羽翼扶義帝以令天下大業未就而先放殺之增無一言以諫羽増之罪一也闗中形勢之地以周公營洛之舉如是之切猶重於遷不肯輕駕而東者以其形勢足恃也羽之入闗能據之以為根本示天下形制之勢則英雄知所向矣迺懐思東歸焚燒屠戮以肆其暴特一巨冦之所為耳豈能有帝王之度哉而増無一言以及之増之罪二也韓信陳平當世之奇才皆常處羽麾下増不能一言薦之以為羽用卒歸於漢平為漢之謀臣而信分漢兵獵取羣雄若孤豚然終以三十萬斃楚垓下以濟大業増之罪三也増有三罪皆足以亡國予故曰髙祖之云怵於鴻門滎陽成臯之阨免於見殺而云爾也若増者豈天下之真才也哉劉先主曹公将征烏桓荀彧以為劉備在荆州必教劉表襲許挾天子以令天下曹公不従决意北伐劉備果欲乗許下之虛言於劉表表不能從暨曹公北還兵勢大張出師以臨江漢劉表甚恐謂備曰不用公言以至於此備曰當今天下紛紜機㑹之來豈有終極若能應之於後此亦未足為恨也夫常人之情少有所得則盈滿少有所失則沮喪英雄之處事則不然失之東隅則欲收之桑榆豈以一失而挫其志哉故髙祖百戰百敗而氣不少衰劉備始得豫州而曹操奪之中得徐州而吕布奪之其氣未嘗少衰也終能取荆収益以成鼎峙之業非天下之英雄其孰能與於此哉劉先主之英概僕於對劉景升之言見之矣天雨天將雨必先蒸濕雲氣騰結而後降雨又龍見而雨必旋至以雨主於龍乎則何待於蒸鬱而後作雨也又有薄雲而後作雨者且龍所取江河之水曽㡬何而為泛溢懐襄之患者何哉二者之説葢無定論也俗諺有云人能變火龍能變水此雖俗説細詳之亦甚有理夫天下之理不能以無為有有其本矣亦必有所待而後發見夫木之為性火實存焉然火無以自見人以一灼之火而變之則木俱火也以至焚邱陵燎原野無所不可者假人之力而致之也雲之為氣水實存焉然水亦無以自見可以為霡霂而不可致霶霈龍以一酌之水而變之則雲俱水也以至於漲江河盈澗谷亦無所不可者假龍之力以致之也火木雲龍二者相待而成者也俗諺雖有此説然不能推其理之所在因為之説唐太宗唐太宗將以晉王為嗣恐大臣不順對長孫無忌等取佩刀以自向而晉王之立遂定是為髙宗其後武后專政唐室㡬於不祀帝王之為萬世慮當擇賢嗣以為宗廟社稷之主無賢嗣則當師堯舜為天下計舉賢者而付畀之何至任情循私而屬於其所甚愛者乎如唐太宗引佩刀自向之舉乃房第間婦人女子之所為也不謂創業英武之君而為之何哉漢髙祖欲立戚姬之子如意一見商山四老従惠帝遊則翻然而改呼戚姬而語之曰吕后真汝主也武帝既立昭帝為嗣慮其有母少子弱之患即日引鈎弋夫人殺之雖太傷於忍其為後世慮亦深矣漢髙帝武帝可謂矚理之明而决然能斷者不謂之英主可乎與唐太宗不可同年而語矣憸佞本朝太宗時西夏圍靈武甚急朝廷遣師援之費耗頗多上意欲棄之而大臣意謂失靈州則邉患將不已上意亦悟令兩府侍従集議時吕端向敏中為相張洎在政府洎逆知上有棄之之意而不知其中變也當集議所面責二相謂其不能推誠徇國吕端曰張洎豈能進切直之言不過揣摹人意耳既而張洎上疏援賈捐之棄朱崖之説以進上曰卿所奏朕不曉一字還以付之洎慙而退上曰張洎果為吕端所料也大臣阿意順旨為利禄計者自古有之近世士夫又有依附權勢全無顧忌者紹興中秦檜秉權士夫争以取媚於檜為能甲戌廷試檜之孫塤在焉科舉條制已有官人不作狀元時有學官入劄子謂朝廷取士當協公議不宜以有官無官為限蓋欲為秦塤地以媚檜也檜以其説形迹太露不答又檜生朝有一名士作九韶以獻其序云九章九辨亂世之音九韶之作以治世之音變亂世之音也其中篇有秦趙之語推原秦嬴與造父同宗且指檜為聖師聖相又以無疆祝其夀如此等語言姦邪不軌甚矣檜受而不報不能暴白其事明正典刑意安在哉其人有文章嘗中甲科與僕同嵗以名聞於時此文成其族人嘗出以見示僕觀畢即擲之至今談及其姓名視之如蛇虺然使其當兩漢之間撰造符命以為亂階者斯人其首也富貴利達其誰不願然亦必以其道非道而得之亦何榮之與有哉於時士夫若此類者甚衆姑識其尤者云籌邉方域之中天之所以區分内外隔限南北者其處有三其中曰大河其南曰大江其北曰大漠三者二在中國一在戎狄大漠雖無深險重阻而其地曠逺徑數百里無穀粟水草故匈奴畏漢者常居漠北葢天以為夷夏之限也五帝三王之世北邉不過幽都朔方涿易之境古先聖王不矜逺略其於戎狄葢振文徳以綏之蓄威武以備之如斯而已下逮戰國燕趙之地與狄為隣各務斥大其封域燕有𤣥莵樂浪趙以隂山髙闕為塞秦并天下逐匈奴戎人割榆中北假之地西北陲比前代益邈逺漢中葉大將軍驃騎之師疾戰窮追邊騎逺遁王庭邱墟葢自漠以南實為内地也魏晉而降迄於隋唐大較幽燕之壤未嘗不在中國自石晉起并門藉契丹之衆以濟大業於是割幽薊瀛莫涿檀順新媯儒武靈應寰翔蔚十六州以畀之由是函夏北邉近逼雄霸厯代設險襟喉扄鑰之固剪棄弗有大河之阻雖在中國而北邉之地率多平陸無髙陵深谷之限戎馬奔突始難控制太宗皇帝籌安邉之計端拱中常下詔其略曰悠久之計在於設險若决大河築長城又徒自示弱為後世笑朕今立法令沿邉作方田可以限戎馬而利我之步兵雖彼衆百萬無所施其勇方田葢類古井田溝洫縦横若碁局然所以隔限代馬抑彼長技太宗皇帝神機妙畧急於用此真可以垂永制以詔後人也仁宗皇帝時又常植榆栁為塞以防邊騎之奔突亦設險之一端也其後林木既成北人患之乃使間説雄州張昭逺曰楊可以為長梯砲梢昭逺遂斬以為用慶厯間上封事者或以為言於是下詔始禁採伐二者之為邉塞之利其可以不知也哉粤自中原失守復失大河之險所恃者長江耳自江以北淮甸之區其地亦多平衍乏巖塹之阻亦猶曩時雄霸之北邉也近嘗見有司作堰儲石梁之水自天長以北頗為沮洳雖稍害民田亦得設險之意後聞已决之矣豈張昭逺長梯砲梢之間行乎誠使今日於真揚以北視其空曠之地舉行二宗之良法講求石梁瓦梁之水利以限制北鄰扼其長驅之勢先為不可勝以待敵之可勝其庶㡬乎酈食其説髙祖漢王數困滎陽成臯欲捐成臯以東屯鞏洛以拒楚酈生説漢王曰楚人拔滎陽不堅守敖倉迺引而東令適卒分守成臯此乃天所以資漢也願足下急復進兵収取滎陽據敖倉之粟塞成臯之險杜太行之道距飛狐之口守白馬之津以示諸侯形勢之勝則天下知所歸矣漢王従之復守敖倉嘗觀漢髙祖之有天下先用蕭何韓信之計自南鄭還定三秦據闗中形勝之地以基王業及楚漢相距則堅守力争滎陽成臯之地以遏其衝而挫其鋭譬如鬭者抗其吭而搏其膺蔑有不濟者矣僕觀廣野君之説是誠曉達地理知山川之險要其言實闗乎當世之大計者夫用兵要以知地理為先用兵而不知地理其猶木偶人是也諸葛孔明為蜀先主畫取荆收益之計其言天下之地理若指諸掌必得如是之人而後可與天下之機務今人千里之外則瞢然無所知何足與論四方之事哉按敖倉在今滎澤縣書云仲丁遷於囂詩云搏獸於囂之地也寰宇志云敖山在滎澤縣西十五里春秋宣公十二年晉師在敖鄗之間敖鄗二山名也秦於此置倉是為敖倉亦曰敖庾東觀記云濵水縣彭城廣陽廬江九江穀九千萬斛送敖倉今屬鄭州備成臯乃春秋時鄭之制邑古東虢之地故莊公曰制巖邑也虢叔死焉又名虎牢穆天子傳云天子射鳥獸於鄭囿有虎在於葭中七萃之士髙奔戎生捕虎而獻之天子命畜之東虞是曰虎牢虎牢之名自是而得晉悼公城而戍之以備楚因以服鄭水經云成臯有大坯山其地巖險秦以為闗即禹貢大河之所經也蒯通言項羽阨西山而不得進者即是山也成臯之北門曰王門今在孟州汜水縣太行山水經云在河内野王縣上黨闗今懐州河内縣也按太行山有八徑第一軹闗徑在蓋州濟原縣西孔安國言桀之敗於鳴條自安邑東入山出太行東南陟河陽遂奔南巢即由此徑也又蔡邕曰太行之上有天井之髙闗是也太行河北之大山鎮也其山自孟州綿亘至幽州界飛狐口據漢書紀注云在今澤州青城縣飛狐之口如淳曰是上黨壺闗顔師古曰壺闗無飛狐口之名臣瓚曰在代郡西南晉建興中劉琨自代出飛狐口奔於安次安次幽州縣也國朝雍熈中北伐田重進敗契丹於飛狐又敗之於飛狐北重進之師無一矣一矢之失即其地也按寰宇志云今蔚州飛狐縣飛狐道自縣北入媯州懐戎縣界即古之飛狐口也漢書王霸傳注亦云在蔚州飛狐縣北通媯州懐戎縣南古之飛狐口也白馬津水經注云河水舊於白馬縣南决通濟濮黄溝故蘓代説燕曰决白馬之口魏無黄濟陽黄黄溝也在今開封考城縣西津之東南有白馬城衛文公渡河居之所謂野處曹邑者也漢二年盧綰劉賈渡白馬津入楚與彭越擊破楚軍又袁紹遣顔良攻東郡太守劉延於白馬皆其地也白馬有韋鄉韋城亦曰韋津又曰鹿鳴津今滑州之白馬是也又寰宇志曰澶州臨河縣亦有白馬城徳清軍黎陽縣東黎陽津一名白馬津十六國春秋慕容徳率戸四萬三千自鄴將徙滑臺至黎陽津燕魯王遣船迎徳㑹風飄船沒魏軍垂至三軍危懼欲保黎陽昏而氷合是夜濟迄旦而魏師至氷亦消泮若有神助徳大悦改黎陽為天橋津髙齊文襄征頴城仍移石濟闗於此既造橋改名曰白馬橋此則白馬津之北㟁也是數處皆闗東河北襟喉之地詳究廣野君之説當時説漢王之時漢已得燕趙韓信將東擊齊楚漢相距於榮陽其言杜太行之道距飛狐之口者葢欲以固燕趙之心也塞成臯之險守白馬之津者葢欲以斷齊楚之路也愚故謂其言實闗當世之大計者又觀酈生之説齊王言今漢已據敖倉之粟塞成臯之險守白馬之津杜太行之阨距飛狐之口天下後服者先亡是時漢王已用酈生之言分兵諸處矣抑知髙祖之善用謀而識兵勢也東園叢説卷下
