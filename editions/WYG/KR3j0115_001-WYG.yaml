body:
  text: 東園叢説卷上宋李如篪撰春秋説春秋行夏之時夏正月建寅商正建丑周正建子者各用其月為嵗首也建寅則稱正月朔旦受命於神宗是建寅則稱正月也建丑則稱十有二月書云十有二月朔伊尹以冕服奉嗣王歸於亳是建丑則稱十有二月也建子則稱一月書云一月戊午師渡孟津是建子則稱一月也一月者謂是嵗首稍變於夏商而謂之一月其實十有一月也詩稱一之日觱發二之日栗烈謂十一月十二月至言四月秀葽五月鳴蜩六月莎雞振羽七月在野八月在宇九月在户十月蟋蟀入我牀下皆據夏正而言也嗟我婦子曰為改嵗以見此月嵗終十一月嵗首也以是考之三王之嵗首惟夏正建寅稱正月二代雖或建丑或建子初不稱為正月秦漢間雖用亥月為嵗首只稱冬十月亦不稱為正月孔子作春秋將立一王之法以夏正得天春秋之法行夏之時葢以周正紀事而以春王正月揭於其首其實則冬十有一月也不然豈得以十一月而強指為春正月哉只縁左氏不曉聖人垂法之意遂斥言元年春王周正月後儒因是相沿遂云商用建丑為正月周用建子為正月使春秋行夏時立法貽後之意晦而不彰左氏之失也詩亡然後春秋作孟子曰王者之迹熄而詩亡詩亡然後春秋作説者皆謂黍離之詩降為國風是詩亡非也孔子序詩國風雅頌各從其體初無褒貶去取在其間也按周召分陜之時周家己有天下闗雎美后妃之德王者之事也為其是風體故謂之國風得於陜之東者為周南得於陜之西者為召南豳七月陳后稷先公風化之所由致王業之艱難與夫東山之作及周公遭變之詩亦同在國風亦以其在風體故也但國風之中有正有變足以明政之得失時之盛衰也黍離之詩所謂變風者也不列之國風將何以處之處之雅乎處之頌乎皆所不可故列於國風而非所謂降也不然則二南豳風俱謂之降可乎且如大雅板蕩召旻之類雖周室大壊無綱紀文章其體是大雅只當列之於大雅之中乂可降之於風耶故知黍離之在國風其體是風而非降也然則孟子所謂詩亡者何也葢嘗考之國風之詩如鄭莊衛宣齊桓秦穆襄晉昭獻之類皆孔子所傳聞之世所作雖變風居多亦本於人情而止乎禮義先王之澤未冺也孔子所聞所見之世亦安得無詩國風無見焉者止乎禮義者無有也此孟子所謂迹熄而詩亡者也非謂黍離列於國風而云也然則春秋何以始乎隱究觀黍離雖作於平王之時而其顛覆之禍幽王為之也其他刺平王者如行役無期度不恤其民屯戍於母家凶年饑饉室家相棄之事亦衰世之常春秋豈為是而作哉逮桓王之立諸侯背叛王師傷敗如左氏所謂周鄭交質取温之麥尚猶可言至於帥師以取成周之禾甚至於射王中肩則諸侯蔑視周室無復有王矣王者威柄自此絶矣桓王之立實當隱公即位之三年故春秋自此而始為無王而作明矣若以東遷之後王政之失始於平王而春秋作則當自惠公始而不當始於隱也杜預以為隱公讓國之賢君故春秋以為始亦非也聖人立一王之法豈以讓國之一節而為春秋之始哉春秋感麟而作孔子嘗語子夏曰明王不作天下其孰能宗子又嘗曰鳳鳥不至河不出圖吾已矣夫麟鳳之至河洛之出圗書乃上天休嘉之應有明王者出然後見也孔子大聖人也必有明王者出然後其志可得而伸而其道可得而行河不出圖鳳鳥不至孔子葢傷無明王者作其事業終不得有見於當世也至魯哀公之西狩麟偶見獲孔子反袂掩面而嘆曰胡為而來哉葢傷明王之不作己志之不伸而麟至之無從也且謂其道不行於當世要必垂之於後代於是作春秋垂一王之法若曰後世有明王者作必將舉而措之以其書感麟而作故至於獲麟而止志在春秋者如斯而已矣其書既存一王之法則其施設之所寓言者無非天子之事故孟子曰春秋天子之事正謂定天下之邪正成天下之事業皆天子之事非孔子欲身為天子之事也李厚作春秋總要序見孟子有此説遂云孔子以天子之事為己任殊不知孔子只是思得明王以行所藴既終不可得於是作春秋見諸行事以明己志耳豈可以匹夫欲以天子之事為己任哉如先儒黜周王魯之説孔子素王丘明素臣之説皆不明夫子作經之㫖黜周王魯春秋書成周宣榭火公羊傳曰新周也黜周王魯之説葢啟於此新周者葢謂王者必存二王之後周有天下則宋杞為二王之後今王魯則以周宋備二王之後是新周而故宋也其説從此濫觴又見黍離之詩列於國風而魯僖之頌又繼周頌之後王魯之説遂得援以為證惟深識之士則知聖經之作皆自有意義也天王狩於河陽左傳云以臣召君不可以訓故書曰天王狩於河陽言非其地也且明德也葢嘗論之周自宣王㑹諸侯於東都之後天子未嘗有巡狩以朝諸侯之事由東遷而來亦未嘗有諸侯朝王之舉究春秋二百四十二年之中天子巡狩諸侯朝王之書蔑如也獨僖二十八年書天王狩於河陽公朝於王所書魯公之朝則諸侯之朝可知已天子為巡狩之舉諸侯即其所而朝之最是東周一時之美事晉文之力也而傳乃有不可以訓之言何哉且明德之言杜預以為明晉文之德其言是也詳究其事文公召王以諸侯見初非欲自尊大葢以當時周室衰微諸侯蔑視王室無復有宗周之念者晉文欲率諸侯朝周以明上下之分又力有所未及兼之皆使去其兵車以入然後可茍不能去又使天子何以自安使天子出狩因率諸侯以朝之其意甚美其謀甚婉矣春秋正色而書之無少貶焉所謂譎而不正者元不在此若以為貶則以錫命之失遂削去天字君乃為臣之所召而反稱天王何也直書天王狩於河陽又書公朝於王所辭無所貶聖人之意可知矣春秋集觧亦嘗明此意後之釋春秋者皆不能到也齊人來歸衛俘左氏傳經文云齊人來歸衛俘公糓經文皆曰齊人來歸衛寶按書稱俘厥寶玉衛俘衛寶其實一也但以俘為寶則掠取分受之罪不彰也當以左氏經文為是盟於召陵盟於袁婁孔子作春秋與奪之意昭然可見如齊威公伐齊屈完之詞未服師次於陘楚人懼使屈完來盟於師夫楚人來盟則其心已服矣於是退師召陵而與之盟示不迫而強之也其仁恕之心待楚之禮可謂兩盡矣故春秋書曰楚子使屈完來盟於師盟於召陵葢美之也晉郤克伐齊敗之於鞌進至袁婁去臨淄纔五十里齊人大恐使國佐如師晉人方且欲得蕭同叔子為質使齊之封内盡東其畝至使齊人不勝其忿無暇滅亡之恤而有收合餘燼背城借一之言於是遂盟國佐於袁婁葢疾之也齊威退師於陘以盟屈完郤克即袁婁以盟國佐二事中禮違禮觀聖人所書之文彰彰可覩矣紀季紀侯春秋誅三叛人以懲不義皆以地出奔者又諸侯失地書名紀滅於齊所書有可疑者方齊襄修九世之憾志乎滅紀自取郱鄑郚之後紀之國勢已危矣紀李不能與紀侯死守迺以酅邑入附於齊與叛人何異春秋方且嘉而稱其字見褒與季子仲孫同等又且書入若内弗受然紀侯不能効死而弗去至於亡國既不言滅又不斥其名書紀季則曰紀季以酅入於齊書紀侯則曰紀侯大去其國何也原其所以葢紀之不能抗齊終必見并紀季知其不免於是以酅入齊以存宗廟且使其姑姊妹親屬得有所歸其以邑附齊非以為利也紀侯初非不道以取滅亡見迫於齊力不能以自全死守徒斃其民無益也於是委而去之去其國亦非為身謀也故二者之書紀季之事不惟異於三叛且取貴於春秋紀侯之去國不惟異於失地之君且有大之之稱其後書叔姬歸於酅則知紀之宗社尚存於酅者紀季之力也書大去其國邑酅之宗社猶得以存安得與叛人并失地之君同日而語哉予謂紀季之賢不可望微子而存宗社與抱祭器以歸周者畧相似紀侯之賢不可望於太王其不以所以養人者害人而去之亦畧相似易説王用三驅失前禽易比卦九五曰顯比王用三驅失前禽講易之家解釋三驅之義或以祭祀賓客充君之庖為三驅或以湯網三面為三驅非惟不曉三驅之義并與一爻之義曖昧而不明矣夫三驅之義見於周官大司馬而説者未之詳也大司馬四時之田立表者四第一表五十步又立一表是第二表去第二表一百步又立一表是第三表去第三表一百步又立一表是第四表車徒之属皆集於第一表之中皆坐鳴鐃振鐸而作驅逐奔驟至第二表而止皆坐是一驅也鳴鐃振鐸又作驅逐奔驟至第三表而止皆坐是二驅也又鳴鐃振鐸而作驅逐奔驟至第四表而止皆坐是三驅也此王者田狩三驅之義也比卦九五取此為言者葢比卦五爻皆隂惟九五一爻是陽又處尊位為羣隂之所附是天下顯然比之者也考其象則坤為輿衆隂為徒坎為豕坎之變為離離為飛鳥以車徒而逐禽豕即有三驅之象王用三驅失前禽者葢上六一爻居前獨後於衆隂又坎為險是衆隂比於九五惟此一爻恃險而不附以三驅之義言之是在前逆而飛去之禽也夫禽之迎而來者順也順則取之背而飛去者逆也逆則舍之夫聖王在上天下皆比附其間有不服者聖王豈肯強之而必欲其比附哉置之度外從其自去而已故曰舍逆取順失前禽也比卦上六一爻即虞氏之三苗是也坤六五伊川先生解易甚明白惟坤卦六五解得未盡伊川云坤雖臣道五實尊位臣居尊位羿莽是也猶可言也婦居尊位女媧武氏是也非常之變不可言也故聖人有黄裳之戒焉按易六五一爻坤卦之至美故曰黄裳元吉孔子釋之曰文在中也又於文言敷暢其義曰君子黄中通理正位居體美在其中而暢於四支發於事業美之至也既曰正位居體安得有羿莽女媧武氏之氣象不知程氏如何發此論参伍以變繫辭言参伍以變錯綜其數説者多引河圗五居中央戴九履一左三右七二四為肩六八為足之説以為縱横十五是謂三五以變三五則然其變維何也夫三以變者伏羲之八卦是也八卦之畫三舉乾一卦言之乾一變巽二變艮三變坤是三以變也五以變者周易重卦是也重卦之畫六以乾一卦言之一變姤二變遯三變否四變觀五變剥六變復變第三畫為晉為遊魂七變復變下三畫為大有為歸魂遊魂歸魂是五變之後再變之卦故只言五變而不言七變即是五以變者也三五之變錯於三百八十四爻之中而綜於萬有一千五百二十之數錯綜其數可知矣參天兩地繫辭言參天兩地而倚數儒者往往説得不甚切當王弼注云參竒也兩偶也七九為陽六八為隂竒偶是也參兩倚數之説則未聞也夫數之所由起本於五行生成者是也夫天一生水成於地六地二生火成於天七天三生木成於地八地四生金成於天九天五生土成於地十故一三五七九為陽二四六八十為隂考之天之生者三地之生者兩天三地兩數之所由起故曰參天兩地而倚數又五行生成之數陽極於九隂極於十九者三三也十者兩五也亦得為參天兩地生蓍繫辭云幽賛於神明而生蓍葢能以吉凶得失預曉於人者神明也神明不能與人相接故聖人生揲蓍之法探神明所為吉凶得失者以示於人使人知有避就故曰幽賛於神明而生蓍也揚雄認錯此意以為聖人有以幽賛於神明而生出蓍草也故太𤣥云混渾天地而産蓍誤矣六者三才之道繫辭云六者非他三才之道也凡卦六畫皆具三才下二畫為地中二畫為人上二畫為天以乾一卦觀之故九二曰見龍在田是下二畫為地也九三曰君子終日乾乾是中二畫為人也九五曰飛龍在天是上二畫為天也太極生兩儀繫辭云易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶後儒便以兩儀為天地兩儀既為天地而八卦中又有乾坤何也殊不知此一段是聖人言生蓍之法也四十九莖聚而為一者太極也分於兩手而為二者即有隂陽二氣是兩儀也既分隂陽揲之則有老陽少陽老隂少隂是四象也遇老陽則其策三十六遇老隂則其策二十四少陽則其策二十八少隂則其策三十二老陽之策三十六是九揲之數也故九為老陽老隂之策二十四是六揲之數也故六為老隂少陽之數二十八是七揲之數也故七為少陽少隂之數三十二是八揲之數也故八為少隂七八九六一定而不可易者也安得外求其説易有八法易之書其法有八曰貞悔曰對變曰反對曰互體曰之變曰世應曰納甲曰飛伏明此八事可與言易矣凡重卦内象為貞外象為悔舉一卦以明之如水雷屯坎上震下震為貞坎為悔對變者如乾對變則為坤反對者如屯坎上震下反對為䝉艮上坎下互體者如屯坎上震下自第二爻至第四爻即有坤體自第三爻至第五爻即有艮體是互體也之變者易以變為占揲出少陽少隂則其爻不變揲出老陽老隂則其爻變所謂變者陽爻即變為隂隂爻即變為陽也以乾坤二卦舉一爻以明之乾卦六畫皆陽乾上乾下若第一爻揲出老陽即變為姤乾上巽下坤卦六畫皆隂坤上坤下若第一爻揲出老隂即變為復坤上震下是為之變也世應者如乾之初九變為隂則為姤而姤卦初六為世九四為應納甲者以六十甲子納於八卦爻中也乾納甲壬坤納乙癸震巽納庚辛坎離納戊巳艮兑納丙丁列之於左乾􅅀壬戌􅅀壬申􅅀壬午􅅀甲辰􅅀甲寅􅅀甲子坤癸酉癸亥癸丑乙夘乙未乙巳震庚戌庚申庚午庚辰庚寅􅅀庚子巽􅅀辛夘􅅀辛巳辛未􅅀辛酉􅅀辛亥辛丑坎戊子􅅀戊戌戊申戊午􅅀戊辰戊寅離􅅀己巳己未􅅀己酉􅅀己亥己丑􅅀己夘艮􅅀丙寅丙子丙戌􅅀丙申丙午丙辰兑丁未􅅀丁酉􅅀丁亥丁丑􅅀丁夘􅅀丁巳飛伏者如乾卦初九是甲子變為姤卦姤乾上巽下巽第一爻是辛丑是辛丑為飛神甲子為伏神也他皆倣此精氣為物游魂為變繫辭云精氣為物游魂為變是故知鬼神之情狀原始反終故知死生之説孔子於鬼神之事未嘗言及子路問事鬼神則曰未能事人焉能事鬼問死則曰未知生焉知死至繫易則曰是故知鬼神之情狀原始反終故知死生之説夫鬼神之情狀死生之説舍易無以明之而非可遽以語人者也觀八卦之變則鬼神死生之情狀始終之義昭然可覩矣凡卦至第六變為游魂精氣盡於此矣是死而為鬼神者也至第七變而為歸魂是精氣復返再生而為人物矣葢八卦之變皆七與正卦為八八卦之變是為六十四舉乾坤二卦之變以明之圖之於左乾乾上乾下乾一變為姤乾上兑下二變遯乾上艮下三變否乾上坤下四變觀巽上坤下五變剥艮上坤下至剥雖下五爻巳變猶有上一爻是乾本體精氣為物者猶在也至六變却變第四爻為陽於卦為晉為游魂離上坤下則乾之精氣盡矣卦為游魂故曰游魂為變乾之本體全不見矣至第七變再變内卦三爻為陽於卦為大有為歸魂離上乾下則精氣復返而為物乾體復見矣坤坤上坤下坤一變為復坤上震下二變臨坤上兑下三變泰坤上乾下四變大壯震上乾下五變夬兑上乾下至夬雖下五爻已變猶有上一爻是坤本體精氣為物者猶在也至六變却變第四爻為隂於卦為需為游魂坎上乾下則坤之精氣盡矣卦為游魂故曰游魂為變坤之本體全不見矣至第七變再變内卦三爻為隂於卦為比為歸魂坎上坤下則精氣復返而為物坤體復見矣震巽坎離艮兑准此六日七分易六十四卦三百八十四爻除震兑坎離四正之卦二十四爻為二十四氣外六十卦計三百六十爻每一爻直一日三百六十爻為一嵗之日按一朞之日三百六十五日四分日之一六十卦三百六十爻則不足者五日四分日之一矣於是分一日為八十分五日四分日之一計四百二十分均該於六十卦之中每卦直六日七分論太𤣥踦贏二贊易六十卦三百六十爻不可増减太𤣥八十一家七百二十九贊亦不可増减易以一爻直一日三百六十爻當朞之日究朞之日數則易爻少五日四分日之一故分一日為八十分五日四分日之一為四百二十分六十卦每卦直六日七分而周一朞矣太𤣥以兩贊直一晝一夜而驗朞之日數則𤣥贊亦少四分日之三當如易不於卦外増爻計所少之數分一日為幾分均該於七百二十九贊之中足矣乃於首外増踦贏二贊夫不増二贊則所少者四分日之三今増二贊則多於朞之日四分日之一此蘓先生所謂四嵗而加一日千嵗之後恐大冬之為大夏者也蔣永叔韶音集進卷中却云揚雄立兩贊多於朞數四分日之一者日行遲緩常至後天故雄多此分數以足周天之度歴數家固有此法然豈有四嵗加一日之理按歴法至七十五年始加一日也蘓先生云恐大冬之為大夏却又不然歴法七十五年日退一度而加一日積至二萬餘年亦將大冬之為大夏矣然自上古至今日之行度久而必差故堯時中星至秦已差半次自太古至今其差豈勝計哉四時不至變亂者日行自有黄道其度雖有差須至加日四時初不易也蘓先生是據冬至日在斗度夏至日在井度差至於井則大冬為大夏矣不知自有黄道之運故也書説召公不説書云周公為師召公為保相成王為左右召公不説周公大聖召公大賢何故不相知心而有不悦之意詳觀君奭一篇葢縁召公欲避位而去周公作此以留之一篇之中盛稱召公當文武之時輔佐二人心德契合周家所由得天下有無窮之休美皆召公之力在今日不可不成就文王光大之業召公既疑周公而不悦周公安可無一言以曉諭之而亟稱其美似非人情周公不為也又召公不説周公在居攝之時庸或有之今已復子明辟同為師保而尚不説必不然也詳究其事周公召公當文武之世以至於有天下皆有大勲傳稱相武王以伐紂翦商一事其謀决於周公太公則其勲名與召公不同况又居攝七年制禮作樂以致太平則其功又非人臣之所能為者方其朝諸侯於明堂召公以下皆北面而事之一旦復子明辟遂同為師保左右成王師保位分敵體召公之心有不能自安者故欲引去不敢與周公比肩如是而不悦耳豈相忌而不悦哉蘓先生稱孔子厄於陳蔡其弟子自能相樂周公在位而召公猶且不説是周公之富貴不若孔子之貧賤蘓公豈不知此一時驅駕其説以為文耳學者不可以為實江漢朝宗於海書云江漢朝宗於海按江河淮濟謂之四瀆以其能獨赴海也水之赴海皆有朝宗之勢何獨於江漢言之且江漢合於夏口去海尚二千餘里即有朝宗之説何也嘗推原其意葢江水逕夷陵而東至於夏口漢水逕漢中厯魏興上庸興勢襄陽而南入於江皆荆楚之境其南當虞夏時則為三苗之國以虞氏之化而尚且弗率逮有商之際荆楚復為患故詩云奮伐荆楚罙入其阻周之衰昭王南征而不復春秋之時荆楚僣號稱王常為中國病故傳曰有王者則後服無王者則先叛葢其民輕剽喜亂厯世患之聖人因二水合并東趨於海故為朝宗之説以示訓猶曰水尚有朝宗人而不知尊君親上之義乎孔頴達疏畧言及其意而言之未詳唐杜工部更天寶之亂作詩獨出於忠憤措意甚深而用事不苟其詩有曰蜀水㑹涪萬瞿塘爭一門朝宗人共仰盜賊爾誰尊葢用尚書江漢朝宗之義也和夷書云岷嶓既藝蔡蒙旅平和夷㡳績鄭氏云和上所居之夷和讀曰桓其地去古既逺莫得而詳也予讀寰宇志洮州美相縣本後周之洪和郡周明帝武成九年置洪和郡屬岷州武帝時郡省以縣屬同和郡同和郡即岷州也後魏大統十年置岷州以南有岷山故以為名尋改為同和郡郡之政和縣有當夷廢城唐貞觀二年亦置當夷縣於此書稱岷嶓既乂蔡蒙旅平和夷底績今洮岷二州之間郡縣有同和洪和政和之稱岷州溢樂縣有步和川又有當夷縣之名名號之起必有由來又在岷嶓之間竊意和夷之地葢在於此也鄭氏之説無所經見非也湯始居亳將治亳殷成湯所居之亳與盤庚所治亳殷實是兩地成湯所居之亳帝嚳嘗居之帝嚳有商之祖也故曰從先王居盤庚所治之亳乃亳殷之地故曰新邑成湯之亳在今應天府穀孰之地盤庚所治之亳在今河南府偃師縣之地諸儒多以為一地其實兩地也契始封商縣故國號為商至盤庚都亳殷於是始有殷之稱至髙宗又遷居河北之朝歌洛邑洛邑為地之中按史記周紀武王有天下已有營洛之意故先置九鼎焉周公相成王成武王之意經營洛邑觀召誥洛誥之書定都之意决矣然而竟不遷都姑以周公君陳畢公相繼尹之成康之世四方無虞太平數十年迄無遷都之舉推原其事葢縁商家賢聖之君六七作遺德在民之久周家雖得天下闗東之民懐商之意未冺也三監之叛其民有反鄙周邦之語自非周公定之闗東之地已非周有矣由是姑保闗中百二山河之勢以臨制東方遂無都洛之舉也如遷殷頑民正如漢髙祖遷齊諸田楚昭屈之類葢撥其強宗以杜其亂耳三澨漢水過三澨至於大别馬融鄭𤣥王肅孔安國咸以三澨水名也許氏曰澨者埤増水邊土人所止也按春秋左氏傳文公十六年楚軍次於勾澨以伐諸庸宣公十四年楚令尹子越師於漳澨定公四年左司馬戌敗呉師於雍澨昭二十三年司馬薳越縊􅅫澨服䖍云或謂之邑或謂之地南陽涓陽之間淯水之濱亦有南澨之稱禮部韻注亦云水邊土人所止其實水際是也究其他水際未有稱澨者諸以澨為名皆漢楚之地恐是其土人以水次為澨也所謂三澨莫究其所在又按定四年呉伐郢楚子常濟漢而陣自小别至於大别然則三澨與二别皆漢水近江之間地名也浮磬禹貢泗濱浮磬孔安國云水中石可以為磬泗水中今無此石按淮陽下邳縣西南八十里有磬山先朝於此取磬石以供樂府其山在泗水之南四十里恐指此為泗濱也今三衢亦有浮石葢其石傍岸而生浮於水上又端州細石作硯甚輕薄土人亦謂之浮石僕意泗濱之浮磬亦其石輕細縝宻以浮稱之耳三江按禹貢於揚州言三江既入震澤底定孔安國不言三江所在酈道元注水經引庾仲初揚都注云太湖東注為松江下七十里有水口分流東北入海為婁江東南入海為東江與松江為三也又禹貢言漢水東為北江入於海江水東為中江入於海安國止云有北有中南可知亦不言何者為北何者為中何者為南兩漢郡國地理志注並云北江在毘陵北東入於海中江出蕪湖西南東至陽羨入海桑欽水經亦云北江在毗陵北界東入於海中江在丹陽蕪湖縣南至㑹稽陽羨縣入於海酈道元曰江出東注於具區謂之五湖口葢言蕪湖之江注於太湖逕松江以入於海也水經又指是水為南江詳觀諸儒之説震澤與大江其中各有三江據禹貢言三江既入震澤底定疑若震澤中自有三江也其言江漢之水則曰東為北江東為中江有北有中不應無南是大江之中自有三江也葢嘗深究之其實不然禹貢於揚州之境所謂三江者併震澤與大江之水而言之也予觀桑欽水經酈道元為之注其言水之源流支派至詳且悉然二子言江漢之水自彭蠡而下甚有疎舛如言北江自毘陵北界東入於海今大江自京口以東至江隂界舊屬毘陵謂之毘陵東北入海然也至言中江自蕪湖縣南東至㑹稽陽羨入海其説疎矣按今太平州蕪湖縣其南有水通大江其水自蕪湖東至黄池鎮又東至銀林遂絶不通自銀林十八里謂之東垻有水逕溧陽宜興入於太湖故今江東諸州之運必經由大江東至京口以入運河以隔於銀林之埧故也葢前代蕪湖之江常逕溧陽宜興以入於震澤是為南江漢志所云陽羨即宜興也宜興之水首受蕪湖江水逕縣之南是曰荆溪後以江水泛溢於太湖為呉中之患故為堰以限之則水經指蕪湖之江以東通太湖且謂之南江其言亦未為失也葢其水舊通太湖逕今蘓州呉江縣之松江東北入青龍江以入於海者是也按呉地秦時雖併屬㑹稽郡後分為呉郡故漢志言首受蕪湖水東至陽羨入海不言㑹稽葢後漢時陽羨已不屬㑹稽也酈道元注水經作於後魏之時與桑欽之水經俱云㑹稽陽羨而酈道元且謂與浙江合豈不妄耶又指蕪湖之水為中江皆不然蕪湖之水東至陽羨者乃南江也僕平常疑諸儒之言三江者而未究其實後為通州酒官自蘓州常熟縣福山登渡扺通州琅山岸其江面逕八十里八十里之中其水有二道最深而流急土人謂其北者為中洪南者為南洪洪亦曰濡兩洪之間皆沙夾海舶皆不可行其可通行者必於兩洪之中惟小舟入水不深者方可徑渡予方悟三江之説其二葢在於此并蕪湖之江舊通太湖由青龍而入海者是為三也後又咨訪其迹通州琅山之東北海門縣界有地名三江口又東則青龍江入海處乃呉越春秋稱范蠡去越乗舟出三江之口入五湖之中者也然後知三江之言實主於此可以無疑其實江漢之水自夏口併流東㑹於彭蠡至京口以東漢水則分為北江江水則分為中江蕪湖之水首受大江舊通太湖出呉松注於青龍併入大江者是謂南江此所謂三江也方三江之堙塞震澤之水不得其所歸而為一方之害三江既入則震澤㡳定宜矣竊意夫三代之前大江東下江漢之水分為二洪並流東注其中葢有斥鹵之地以分其疆域去古既逺日漸坍沒遂成沙矣至今惟見一江之中其流有二水深而流急耳然大江之二洪予以為江漢之水禹貢之所謂北江中江者則今之中洪乃北江南洪乃中江而北人乃以中洪南洪為言者實由北江之水去北岸最逺居於水面之中故土人指為中洪又居其南者則指為南洪其實今之中洪乃禹貢之漢水東為北江者是也今之南洪乃禹貢之江水東為中江者是也蕪湖水首受大江東注震澤自青龍併入大江之尾閭者實為南江故曰禹貢之所謂三江併大江與震澤之水而言之也蘓先生子瞻嘗論三江以豫章之水為南江併江漢之水為三江詳禹貢之書揚州界言三江既入豫章亦揚州之界也然江漢之水自㑹於彭蠡之後方曰東為北江東為中江而豫章之水乃今江西灨溪與鄱陽等水㑹於彭蠡者也安得援此以為南江哉然大江之流水之併歸者却有三江西自蜀郡而下東至海者中江也西北自漢沔而東至夏口而南入於大江者北江也西南合瀟湘灃沅之水㑹於洞庭至巴陵西合於大江者南江也則荆界亦可以稱三江但禹貢所言三江既入震澤㡳定據揚州之境而言亦不得用此以為之解也三禮説月令堯典仲夏之月日永星火謂心星昏中也至月令仲夏之月則昏亢中堯典仲冬之月日短星􅄧謂􅄧星昏中也至月令仲冬之月則昏東壁中考之堯典中星與月令中星率差半次所以如此者葢縁日行遲緩月行疾速日之行日行一度月之行日行十三度十九分度之七就其中日之行又不能無毫釐之不及故厯家率五十年而退一度議者謂五十年為太過率七十五年而退一度堯時冬至日在虛宿故昴星昏中至吕令二千餘嵗合退三十餘度冬至日在南斗故東壁昏中也自漢而下以迄於今中星之差亦可得而推也又堯典中星只以二十八宿為言至月令二十八宿之外又指弧建二宿以為言葢由二十八宿之中井度最多昏旦中星人目所覩春分之節井星昏中斗星旦中二星其度闊昏時井星已過西而其實皆在井度中旦時斗星已過西而其實猶在斗度中目之所覩見其星已西而指為中星則不能不惑弧在井度之内旦而正中故又取二星以正昏旦也祭凡食必取少許置於器中以祭先造飲食之神今人謂之出生者是也故禮云飲食必祭示有先也周禮膳夫受祭器又人君之祭器授之膳夫也魯語云君祭先飯謂侍飲食於君祭先飯謂侍食於君祭則先飯而次及他也喪制禮經五禮之中喪禮最詳儒者以無益於進取講論所不及以古人所重因叙其畧凡死有復有小斂有大斂有殯有𦵏有虞有祔士庶人始死即升屋而號曰臯某復若君則復於小寢大寢四郊庫門以生時常所往處也在道則升車而呼復者葢以旌招其魂而欲其復盡愛之道耳其旌即謂之重置於坐以受奠享及巳𦵏反而虞祭始為木主其旌則或綴諸主或藏之故禮曰殷主綴重焉周主重徹焉其旌今世俗謂之兆揭於竿及置於坐者是也始死既復其魂已不返矣而後浴尸惟君用鬯葢以香草置湯中以浴尸也春夏即用夷盤貯氷以寒尸周禮凌人大喪供夷盤氷是也既浴楔齒綴足帷堂揳齒用角柶以通飯含也綴足謂聫綴屨履之屬帷堂者男女方亂故帷堂帷堂即換新衣遷尸於户内布絞縮者一横者三君錦衾大夫縞衾士緇衾皆一先斂衣次斂衾以絞束之然後加冒殺君錦冒黼殺大夫𤣥冒黼殺士緇冒赭殺凡冒質長與手齊葢以韜尸也殺者冒之下韜足者也小斂又加夷衾斂巳徹帷未有席天子七日大夫五日士三日而大斂大斂亦有絞紟縮者三横者五布紟二衾君大夫士一也君陳衣於庭百稱大夫陳衣於房東五十稱士陳衣於序東三十稱奠於堂方有席天子七月而𦵏大夫三月士踰月既𦵏返日中而虞弗忍一日離也虞置木主周桑是日也以虞易奠卒哭而成事是日也以吉祭易喪祭其變而之吉也比至於祔必於是日也接不忍一日未有所歸也檀弓云豈若速返而虞者葢欲死者速有所依也至祔於廟又易虞主周人以栗七廟九廟鄭康成之説王者親廟四二昭二穆與太祖之廟而五周家七廟后稷為太祖文武二祧不遷故有七廟王肅以為王者親廟六三昭三穆與太祖廟而七周家文武二祧不遷共為九廟按商書言七世之廟可以觀德自周以前已有七廟不縁文武二祧而七當以王肅九廟之説為是祭存三古凡祭必存三古郊血大饗腥上古之禮也體其犬豕牛羊中古之禮也實其簠簋籩豆鉶羮近古之禮也血腥未有火化上古之俗然也體薦則爓湯中古之俗然也至於簠簋籩豆其食物腍矣太羮不致滋味鉶羮則加鹽菜之屬近古之俗然也葢祭祀之禮求之上古又求之中古又求之近古備古今之禮以交於鬼神於彼乎於此乎庶乎或饗之也故禮曰郊血大饗腥三獻爓一獻孰又曰血腥爓腍祭皆備三古而言三年耕必有一年之食三年耕必有一年之食九年耕必有三年之食以三十年之通則有九年之食雖有旱乾水溢民無菜色據三年而餘一年之食二十七年已有九年之食而必三十年通計方有九年之食者葢三十年本合有十年之食縁三十年之中有十二箇閏月多用一年之食故通計只有九年之食也孔子稱必世而後仁以國用不乏衣食足而知榮辱人之情也故必待三十年而王化洽也古者制國用必於嵗之杪五穀皆熟貢賦皆入然後制國用計一嵗所入之數而四分之用其三而舍其一至三年又足三分可支一年故三年必有一年之食九年必有三年之食三十年之通而有九年之食也土圭測景洛陽陽城縣舊屬河南府今屬許州周公測景以求地中之處也其測景之法葢表八尺以立於其地又為土圭長尺有五寸卧於表之北夏至之日日正中時表景與土圭齊謂之地中乃於此建王國焉若表立於此地之南則景長其地多暑立於此地之北則景短其地多寒立於此地之東則其地夕多風立於此地之西則其地朝多隂周禮稱日南日北日東日西者指陽城日景而言也南北之景率千里而差一寸惟陽城晷景尺有五寸為地中也鄉遂古者兵農一體周家鄉遂之制兵寓其中近國為鄉為鄉者六郊外為遂為遂亦六其鄉則五家為比五比為閭五閭為族五族為黨五黨為州五州為鄉遂則五家為隣五隣為里四里為鄼五鄼為鄙五鄙為縣五縣為遂其兵制則五人為伍比與鄰之夫也五伍為兩兩二十五人閭與里之夫也四兩為卒卒百人族與鄼之夫也五卒為旅旅五百人黨與鄙之夫也五旅為軍軍二千五百人州與縣之夫也五軍為師師一萬二千五百人鄉與遂之夫也葢鄉遂各有萬二千五百家各有萬二千五百人六卿率之鄉則出征遂則居守魯人三郊三遂是大國三卿也周家不用商聲大司樂祭天神地祇人鬼備宫角徵羽四聲不用商聲者周家木德金尅木商金也故不用大宗小宗古者諸侯卿大夫皆世襲嫡子既襲爵位其庶子謂之别子别子不得祭宗廟故自别子以下則自為宗别子之嫡長子與嫡長孫相繼而下為大宗凡自别子出者皆宗之不遷之宗也禮所謂宗其繼别者百世不遷之宗者也其别子之庶子則又自為宗庶子之長子長孫相繼而下為小宗自庶子出者皆宗之至五世則遷禮所謂繼禰為小宗五世則遷之宗也庶子為禰繼禰者庶子之子也近代既無世襲則無大宗惟宗室則當有大宗小宗而無其制故蘓先生欲使天下皆行小宗繼禰之法葢欲聫宗族以教親睦也兩之以九竅之變參之以九藏之動周禮醫師云兩之以九竅之變參之以九藏之動人之身其陽竅七隂竅二總隂陽而為兩有疾而為變其事顯然而可知者也所謂兩之以九竅之變者也心肺肝脾腎胃大腸小腸膀胱為九藏其中有變不可得而見而其血脈之動常觸於寸口醫之能知者必於人兩手臂髙骨之下用三指測候之九藏之動不逃於三指之下因以决人之生死安危和緩俞跗之流不能舍此而已疾也所謂參之以九藏之動者也隂德陽德大宗伯云以天産作隂德以中禮防之以地産作陽德以和樂防之何謂隂德陽德曰隂陽者非竒耦也葢主隱之與顯也漠然無朕兆之可窺者隂德也顯然有可驗之形者陽德也夫喜怒哀樂愛惡欲之根於性情者出於天産也是漠然無跡之可窺者也此七情之發不以中禮防之則人偽勝而天理滅故曰以天産作隂德以中禮防之耳目口鼻手足軀體之間者出乎地産者也是顯然有可覩之形者也其視聽言動不以和樂防之則猖狂非僻無所不至故曰以地産作陽德以和樂防之故中庸以喜怒哀樂未發之謂中發而皆中節謂之和而禮者所以制中而樂者所以道和也聖賢不愧屋漏而每謹其獨如怒不遷而過不貳是以中禮防其内者也步趨則有環珮之聲升車則有和鸞之節燕饗則有聲歌在御則有琴瑟手舞足蹈而非僻無自而入是以和樂防其外者也詩説周南召南詩序稱用之鄉人焉用之邦國焉稱用之何也按儀禮燕歌周南闗雎葛覃卷耳召南鵲巢采蘩采蘋鄭氏云國君夫人房中之樂歌也周南召南風化之本故謂之鄉樂葢周房中以及朝廷燕饗與鄉射飲酒俱用之也故曰用之鄉人焉用之邦國焉魯語曰人而不為周南召南其猶正牆面而立也與為即與用同也芣苢芣苢韓詩直云車前今俗人謂之蝦蟇衣者是也山海經則芣苢為木云實似李食之宜子生於西戎按二字從草安得是木又芣苢之詩係周南所采之詩既生西戎周南之地在陜之東其人安得而采之因以為詩也長庚詩云東有啟明西有長庚先儒多以為一星在西為長庚東為啟明非也夫在西者昏見在東者未明先見是啟明居日之前長庚居日之後若是一星豈應一昏旦之間昏在日後旦在日前之理按五緯之中金水二星常隨日長庚啟明乃金水二星也漢書髙帝紀冬十月五星聚於東井髙允崔浩並以為不然葢縁仲夏之月日在東井十月日在尾箕金水無縁㑹於東井也五星之聚當在五月耳詩各有體孔子删詩為三百篇國風雅頌各從其體而類聚之有風體者則列之國風有雅體者則列之雅有頌體者則列之頌雅又分大小二雅只言一事如鹿鳴燕羣臣嘉賓皇皇者華君遣使臣之類主於一事如此之類即謂之小雅如烝民大明文王之類其文非止一事往往廣及道德政化之本如此之類即謂之大雅又有一詩而備三體者豳七月之詩是也七月之詩自女心傷悲殆及公子同歸以上有風體故為豳風自為此春酒以介眉夀以上有雅體故為豳雅自稱彼兕觥萬夀無疆以上有頌體故為豳頌周家祀享通用之也生民𤣥鳥帝王之興必有神異不可以常理推也司馬遷言后稷之生由姜嫄履巨人跡而生契之生由簡狄吞𤣥鳥之卵而生故生民之詩云履帝武敏歆載震載夙載生載育時維后稷又曰以赫厥靈上帝不寧不康禋祀居然生子以其生之竒異故置之隘巷平林寒氷之地以驗之而名之曰棄而𤣥鳥之詩明言天命𤣥鳥降而生商則巨人跡元鳥卵其事不妄矣而説者乃云詩人所言謂髙禖從祀之時隨帝之步武以元鳥至之日祀於髙禖二詩之意皆主於髙禖而為言也夫帝王髙禖之祀特常典耳豈惟后稷之生與契之生獨言之厥初詩人之作史遷之言為是我姑酌彼兕觥卷耳詩云陟彼髙岡我馬𤣥黄我姑酌彼兕觥惟以不永傷注云觥罰爵也燕饗所以用之者禮自立司正之後旅酬必有醉而失禮者罰之亦所以為樂今人宴㑹求席中人舉動言語之謬誤者則罰酒以為笑樂其所由來逺矣用金銀為環置指間詩注古者后妃羣妾以禮進御於君女史書其日月授之以環以進退之生子月辰以金環退之當御者以銀環進之著於左手既御者著於右手事無大小記以成法今世俗人用金銀為指環置於指間以記事自古有之也有女同車有女同車之詩刺鄭太子序稱太子忽常有功於齊齊侯欲以文姜妻之齊女賢而不答卒以無大國助至於見逐鄭忽失齊之援至於失國其事則然矣按文姜嫁於魯威生子同即魯莊公其母文姜滛亂為二國患猗嗟之詩嘗刺莊公不能防閑其母有女同車之詩反謂齊女賢而不答何也闗雎闗雎之詩本言后妃之德首章言闗闗雎鳩在河之洲窈窕淑女君子好逑夫闗雎之為禽摯而有别以况后妃之德明矣窈窕淑女宜為君子之逑匹是亦主后妃為言也夫窈窕淑女既言后妃下章又言窈窕淑女寤寐求之求之不得寤寐思服則所謂窈窕淑女乃后妃之所求似非主於后妃為言也既言后妃求窈窕之女又以窈窕之女為后妃作詩之體不如是也予謂首章闗闗雎鳩在河之洲二句是况后妃之德繼言窈窕淑女君子好逑廼后妃思得賢女以配君子之義故序稱哀窈窕思賢才而無傷善之心焉其意可如也夫人君自后妃而下夫人世婦御妻皆人君之逑匹也不必以好逑之文專為后妃也召伯聽訟行露之詩云誰謂雀無角何以穿我屋誰謂女無家何以速我獄雖速我獄室家不足誰謂䑕無牙何以穿我墉誰謂女無家何以速我訟雖速我訟亦不女從葢言當時有強暴之男侵凌貞女爭訟至於召伯之前其間強暴之男初無納采問名之儀直欲以強爭取之其訟為易决譬如雀之無角豈能穿其屋室家之禮不講安能強取其女其訟為易决也至於強暴之男有強委禽之類指為納采問名之事其訟為難明譬如䑕實有牙信乎可以穿屋雖有疑似難辨之跡亦不能欺終不汝從也此詩人所謂美召公之聽訟也左傳説艮之八揲得艮卦初六九三六四六五上九五爻並遇老隂老陽其爻俱變惟六二一爻得八為少隂不變史氏見此一爻不變故曰艮之隨也圖二卦於左艮艮上艮下此一爻為少隨兑上震下隂得八不變亥有二首六身史趙曰亥有二首六身下二如身是其日數也葢以亥字横看以為算位故士文伯曰然則二萬六千六百有六旬也絳縣老人稱臣生之嵗正月甲子朔四百有四十五甲子矣其季於今三之一也葢自其年甲子至今來甲子四百四十有五甲子末後一甲子得甲子甲戍終癸未計二十日至後甲子尚少四十日故曰其季於今三之一也四百四十五甲子總計二萬六千七百日少四十日則是二萬六千六百六十日也史趙云文伯之言數與絳老所言不差但傳文師曠言七十三年矣計七十三年只當二萬六千二百八十日尚有三百八十日則是七十四年有竒也考之魯叔孫惠伯㑹郤成子承筐之嵗正是七十四年印文傳寫誤以四年為三年耳非師所言之誤也若據二萬六千六百六旬之數七十四年當二萬六千六百四十日尚多二十日雖稱七十五年可也師曠只指㑹於承筐之嵗計七十四年者葢絳老生在㑹於承筐年中不必在朔旦甲子而生不得以朔旦甲子計其年數也風馬牛書云馬牛其風臣妾逋逃勿敢越逐葢封境相接馬牛或有風逸臣妾或有逋逃越逐不復即起爭競之端故費誓以此告戒欲息爭端也齊國邊北海楚國邊南海封境隔逺雖是馬牛風逸越逐不復之爭無縁相及何事而兵臨其地屈完問齊之意葢如此耳杜氏注云馬牛風逸邊境之細事解釋甚明學者不照杜氏所注多憑臆見有云馬順風牛逆風兩者相背或云馬牛風逸相逐亦不及其地並失本意包茅縮酒禹貢言包匭菁茅葢二物充祭祀之用欲致其齋潔故包而匭之也孔安國於包字下注橘柚是據厥包橘柚錫貢之文以包為橘柚謬矣夫祭祀所以必有茅者為欲縮酒也葢古之為酒不如近代用縑素為袋以取清酒其取之也頗簡率必有糟粕之屬不能盡去按周禮五齊曰泛齊曰醴齊曰盎齊曰緹齊曰沈齊注云成而滓浮泛者為泛齊成而翁翁然葱白色者為盎齊成而滓沈者為沈齊三酒曰事酒曰昔酒曰清酒清酒祭祀之酒乃沈齊也雖名為酒仍有滓漬沈於其下故當其祭祀之際必有束茅以酒沃其上以去滓漬欲其清而潔也其説見於崔靈恩三禮義宗今人有喪奠之者亦束茅一截置於盤中祼酒必沃於茅之上亦上古縮酒之儀制俗人不知此以為使若鬼神吸之鄭氏周禮注亦如此説陋矣先軫晉文之霸成於城濮之戰城濮之勝成於先軫之謀合齊秦之交而使楚人不得不戰軫之謀也如使宋人賂齊秦藉之以告楚執宛春及曹伯分曹衛之田以激楚之怒齊秦之交合矣楚人不欲戰而不能矣敗楚師以釋宋圍諸侯震恐其誰敢不服借使當時之謀不如是之婉楚人雖釋宋而歸不决於一戰豈能遽然號令諸國若是其速哉但其謀詭譎非仁義之兵而黠數機巧有以役使與國俾強敵亦由之而不知亦可喜也兩葵丘齊侯使連稱管至父戍葵丘又諸侯盟於葵丘杜預注戌葵丘云在臨淄西注盟於葵丘云陳留外黄東有葵丘葢兩地也京相璠云齊西五十里有葵丘葢連稱所戌之地也寰宇誌開封考城縣東一里有葵丘葢所盟之地也按左傳稱齊侯使連稱管至父戌葵丘𤓰時而往及𤓰而代期至請代弗許故謀作亂使其從妹之在公宫者為間而弑㐮公若非所戍之地近於齊都安能謀及婦人而為公室之亂乎則臨淄西之葵丘是也又按齊威公為葵丘之㑹晉獻公往㑹之遇宰孔曰可無㑹也齊侯不務德而勤逺畧故北伐山戎南伐楚西為此㑹也若所㑹之地去齊稍近安得指其逺畧而有西為此㑹之言哉則考城之葵丘是也陳留開封一也臨淄即齊之所都魚麗陣原繁髙渠彌以中軍奉公為魚麗之陣司馬法二十五乘為偏葢以車列於前以步卒五伍相承於其次以彌縫偏之闕漏其陣非圎非方形於畫一而徹於後狀如羣魚游於水面然是為魚麗之陣也歌鐘二肆與其鎛磬傳云鄭人賂晉侯以歌鐘二肆與其鎛磬者按周禮小胥凡懸鐘磬半為堵全為肆鄭康成曰鐘磬編懸之十六枚而在一簨􅒶謂之堵鐘一堵磬一堵謂之肆葢贈晉侯以四堵之鍾也又新築人仲叔于奚請曲懸是欲鐘磬各用一肆以僣大夫之禮也葢天子宫懸鐘磬各四堵其形如宫諸侯軒懸鐘磬各三堵敞其一面形如軒大夫曲懸鍾磬各二堵又徹去其一方其形曲也周官曰判懸士特懸鐘磬各一堵三方皆無只有其一故曰特也十六枚為一架者是為編鐘編磬又自有鎛鐘鎛磬隨月律而為之制皆特懸於一架魏絳用兵之道要歸於廟算晉悼公之霸其功全在魏絳方無終子嘉父納虎豹之皮以請和諸戎悼公將弗許魏絳曰諸侯新服陳新來和將觀於我我德則睦否則攜貳勞師於戎而楚伐陳必弗能救是棄陳也諸華必叛獲戎失華無乃不可乎於是和戎三駕而楚不敢與之爭楚人不敢加兵於中夏者二十有五年豈非廟算之勝乎葢不肯勞師於所緩之地蓄其勇鋭以全制楚人也至於章邯為秦將兵以臨闗東闗東諸雄所可慮者劉項雖項梁之軍再破猶未可以蔑視也而邯以為楚不足慮方且左馳右騖以獵羣冦又且引兵渡河盡鋭以攻鉅鹿故項救趙而邯力不能支一敗而不可復振其廟算為何如哉其處者為劉氏左氏士㑹自秦歸於晉秦人歸其孥其處者為劉氏由左氏突然有此一句故漢儒推原其始謂陶唐氏之後有劉累范氏其後也士㑹之歸别族在秦者復累之故姓班固髙帝賛曰漢帝本系出自唐帝降及於周在秦作劉左史亦因是得列學官劉漢之將有天下丘明其先如之耶抑附㑹而為之説耶此一句甚異元后今大名府元城縣春秋僖公十四年沙鹿崩晉史卜之曰隂為陽雄土火相乗故有沙鹿崩後六百四十五年宜有聖女興其齊田乎後王公孺自齊徙元城正直其地日月當之王氏為舜後土也漢火也王禁生政君其母夢月入懐年十八詔入太子宫生成帝為元后漢氏道汙四世稱制故曰火土相乗而為雄也揚雄作誄曰太隂之精沙鹿之靈作合於漢配元生成東園叢説卷上
